    - data:
        code: "import xml.etree.ElementTree as ET\nimport json\nfrom datetime import\
          \ datetime, timedelta\n\ndef main(rss_body: str, source_name: str, source_category:\
          \ str, status_code: int) -> dict:\n    if status_code != 200 or not rss_body\
          \ or len(rss_body) < 50:\n        return {\"result\": json.dumps({\"source\"\
          : source_name, \"items\": [], \"error\": f\"HTTP {status_code}\"}, ensure_ascii=False)}\n\
          \n    items = []\n    try:\n        root = ET.fromstring(rss_body)\n   \
          \     ns = {'atom': 'http://www.w3.org/2005/Atom', 'dc': 'http://purl.org/dc/elements/1.1/'}\n\
          \n        # RSS 2.0\n        for item in root.findall('.//item')[:10]:\n\
          \            title = (item.findtext('title') or '').strip()\n           \
          \ link = (item.findtext('link') or '').strip()\n            pub_date = item.findtext('pubDate')\
          \ or item.findtext('dc:date', '', ns) or ''\n            desc = (item.findtext('description')\
          \ or '')[:300]\n            if title:\n                items.append({\"title\"\
          : title, \"url\": link, \"date\": pub_date, \"summary\": desc, \"source\"\
          : source_name, \"category\": source_category, \"type\": \"primary\"})\n\
          \n        # Atom fallback\n        if not items:\n            for entry in\
          \ root.findall('atom:entry', ns)[:10]:\n                title = (entry.findtext('atom:title',\
          \ '', ns) or '').strip()\n                link_el = entry.find('atom:link',\
          \ ns)\n                href = link_el.get('href', '') if link_el is not\
          \ None else ''\n                date = entry.findtext('atom:updated', '',\
          \ ns)\n                desc = (entry.findtext('atom:summary', '', ns) or\
          \ '')[:300]\n                if title:\n                    items.append({\"\
          title\": title, \"url\": href, \"date\": date, \"summary\": desc, \"source\"\
          : source_name, \"category\": source_category, \"type\": \"primary\"})\n\
          \    except Exception as e:\n        return {\"result\": json.dumps({\"source\"\
          : source_name, \"items\": [], \"error\": str(e)[:200]}, ensure_ascii=False)}\n\
          \n    return {\"result\": json.dumps({\"source\": source_name, \"items\"\
          : items, \"error\": None}, ensure_ascii=False)}"
