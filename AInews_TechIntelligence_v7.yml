    - data:
        code: "from datetime import datetime, timedelta\nimport json\n\ndef main(topic:\
          \ str) -> dict:\n    today = datetime.now()\n    # \u6708\u6C34\u91D1\u914D\u4FE1: \u524D\u56DE\u914D\u4FE1\u304B\u3089\u306E\u5DEE\u5206\u671F\u9593\u3092\u8A08\u7B97\n\
          \    weekday = today.weekday()  # 0=\u6708, 2=\u6C34, 4=\u91D1\n    if weekday == 0:  #\
          \ \u6708\u66DC: \u91D1\u2192\u6708\u306E3\u65E5\u5206\n        days_back = 3\n    elif weekday == 2:  # \u6C34\u66DC: \u6708\u2192\u6C34\u306E2\u65E5\u5206\n\
          \        days_back = 2\n    elif weekday == 4:  # \u91D1\u66DC: \u6C34\u2192\u91D1\u306E2\u65E5\u5206\n        days_back\
          \ = 2\n    else:\n        days_back = 1\n\n    start_date = today - timedelta(days=days_back)\n\
          \    date_range = f\"{start_date.strftime('%Y\u5E74%m\u6708%d\u65E5')}\u301C{today.strftime('%Y\u5E74%m\u6708%d\u65E5')}\"\
          \n    query_suffix = f\"after:{start_date.strftime('%Y-%m-%d')}\"\n\n  \
          \  # \u56FA\u5B9A5\u30AB\u30C6\u30B4\u30EA\u5B9A\u7FA9\n    fixed_categories = json.dumps([\n        {\"id\": \"\
          llm\", \"name\": \"LLM/\u57FA\u76E4\u30E2\u30C7\u30EB\", \"query_template\": f'(\"{topic} LLM release\"\
          \ OR \"{topic} foundation model\") {query_suffix}'},\n        {\"id\": \"\
          devtools\", \"name\": \"\u958B\u767A\u30C4\u30FC\u30EB/\u30D5\u30EC\u30FC\u30E0\u30EF\u30FC\u30AF\", \"query_template\": f'(\"{topic}\
          \ developer tools\" OR \"{topic} SDK framework\") {query_suffix}'},\n  \
          \      {\"id\": \"business\", \"name\": \"\u30D3\u30B8\u30CD\u30B9/\u4F01\u696D\u52D5\u5411\", \"query_template\"\
          : f'(\"{topic} business acquisition funding\" OR \"{topic} enterprise\"\
          ) {query_suffix}'},\n        {\"id\": \"regulation\", \"name\": \"\u898F\u5236/\u5B89\u5168\u6027\"\
          , \"query_template\": f'(\"{topic} regulation policy safety\" OR \"{topic}\
          \ AI ethics governance\") {query_suffix}'},\n        {\"id\": \"research\"\
          , \"name\": \"\u7814\u7A76/\u6280\u8853\u9769\u65B0\", \"query_template\": f'(\"{topic} research breakthrough\"\
          \ OR \"{topic} new technique paper\") {query_suffix}'}\n    ], ensure_ascii=False)\n\
          \n    return {\n        \"date_range\": date_range,\n        \"query_suffix\"\
          : query_suffix,\n        \"start_date_iso\": start_date.strftime('%Y-%m-%d'),\n\
          \        \"today_iso\": today.strftime('%Y-%m-%d'),\n        \"fixed_categories\"\
          : fixed_categories\n    }"
        code_language: python3
