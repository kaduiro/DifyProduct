    - data:
        code: "import xml.etree.ElementTree as ET\nimport json\n\ndef main(arxiv_body:\
          \ str, status_code: int) -> dict:\n    if status_code != 200 or not arxiv_body:\n\
          \        return {\"arxiv_items\": \"[]\"}\n\n    items = []\n    try:\n \
          \       ns = {'atom': 'http://www.w3.org/2005/Atom', 'arxiv': 'http://arxiv.org/schemas/atom'}\n\
          \        root = ET.fromstring(arxiv_body)\n\n        for entry in root.findall('atom:entry',\
          \ ns)[:20]:\n            title = (entry.findtext('atom:title', '', ns) or\
          \ '').strip().replace('\\n', ' ')\n            link_el = entry.find('atom:link[@type=\"\
          text/html\"]', ns)\n            if link_el is None:\n                link_el\
          \ = entry.find('atom:link', ns)\n            href = link_el.get('href',\
          \ '') if link_el is not None else ''\n            published = entry.findtext('atom:published',\
          \ '', ns)\n            summary = (entry.findtext('atom:summary', '', ns)\
          \ or '').strip()[:300]\n\n            authors = []\n            for author\
          \ in entry.findall('atom:author', ns)[:3]:\n                name = author.findtext('atom:name',\
          \ '', ns)\n                if name:\n                    authors.append(name)\n\
          \n            categories = []\n            for cat in entry.findall('atom:category',\
          \ ns):\n                term = cat.get('term', '')\n                if term:\n\
          \                    categories.append(term)\n\n            items.append({\n\
          \                \"title\": title,\n                \"url\": href,\n    \
          \            \"date\": published,\n                \"summary\": summary,\n\
          \                \"authors\": \", \".join(authors),\n                \"categories\"\
          : \", \".join(categories),\n                \"source\": \"arXiv\",\n   \
          \             \"category\": \"Research\",\n                \"type\": \"primary\"\
          \n            })\n    except Exception as e:\n        return {\"arxiv_items\"\
          : json.dumps([{\"error\": str(e)[:200]}], ensure_ascii=False)}\n\n    return\
          \ {\"arxiv_items\": json.dumps(items, ensure_ascii=False)}"
