          \ = f\"{item['title']}\\n{item.get('url', '')}\\nSource: arXiv (Research)\\\
          nAuthors: {item.get('authors', '')}\\n{item.get('summary', '')}\"\n    \
          \        all_items.append(text)\n    except:\n        pass\n\n    return\
