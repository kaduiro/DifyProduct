    - data:
        code: "import json\n\ndef main(prev_delivery: str, watchlist: str) -> dict:\n\
          \    # \u524D\u56DE\u914D\u4FE1\u30C7\u30FC\u30BF\u306E\u30D1\u30FC\u30B9\n    prev_keywords = []\n    prev_article_titles = []\n\
          \    try:\n        prev_data = json.loads(prev_delivery)\n        if isinstance(prev_data,\
          \ list) and len(prev_data) > 0:\n            prev_record = prev_data[0]\n\
          \            prev_keywords = prev_record.get('keywords', [])\n         \
          \   categories = prev_record.get('categories', {})\n            for cat_items\
          \ in categories.values():\n                if isinstance(cat_items, list):\n\
          \                    for item in cat_items:\n                        if\
          \ isinstance(item, dict) and 'title' in item:\n                        \
          \    prev_article_titles.append(item['title'])\n    except:\n        pass\n\
          \n    # \u30A6\u30A9\u30C3\u30C1\u30EA\u30B9\u30C8\u89E3\u6790\n    watch_items = []\n    watch_keywords = []\n    try:\n\
          \        wl = json.loads(watchlist)\n        if isinstance(wl, list):\n\
          \            for item in wl:\n                watch_items.append({\n   \
          \                 \"name\": item.get(\"technology_name\", \"\"),\n     \
          \               \"id\": item.get(\"id\", \"\"),\n                    \"\
          history\": item.get(\"update_history\", [])\n                })\n      \
          \          watch_keywords.append(item.get(\"technology_name\", \"\"))\n\
          \    except:\n        pass\n\n    return {\n        \"prev_keywords_json\"\
          : json.dumps(prev_keywords, ensure_ascii=False),\n        \"prev_titles_json\"\
          : json.dumps(prev_article_titles, ensure_ascii=False),\n        \"watchlist_json\"\
          : json.dumps(watch_items, ensure_ascii=False),\n        \"watch_keywords\"\
          : \", \".join(watch_keywords)\n    }"
        code_language: python3
