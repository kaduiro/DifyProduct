          \        hashes = json.loads(new_hashes)\n        findings = json.loads(filtered_findings)\n\
          \        for i, h in enumerate(hashes):\n            if i < len(findings):\n\
          \                hashes_to_save.append({\n                    \"hash\":\
          \ h,\n                    \"title\": findings[i].get(\"title\", \"\"),\n\
          \                    \"url\": findings[i].get(\"url\", \"\"),\n        \
          \            \"source_domain\": findings[i].get(\"domain\", \"\"),\n   \
          \                 \"first_seen_date\": today_iso\n                })\n \
          \   except:\n        pass\n\n    return {\n        \"delivery_json\": json.dumps(delivery_record,\
          \ ensure_ascii=False),\n        \"hashes_json\": json.dumps(hashes_to_save,\
          \ ensure_ascii=False)\n    }"
