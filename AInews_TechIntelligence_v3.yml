    - data:
        code: "import json\nimport hashlib\nimport re\n\ndef main(raw_findings: list,\
          \ domain_trust_json: str, prev_titles_json: str, prev_keywords_json: str)\
          \ -> dict:\n    # ドメイン信頼度テーブル読み込み\n    trust_map = {}\n    try:\n      \
          \  trust_data = json.loads(domain_trust_json)\n        if isinstance(trust_data,\
          \ list):\n            for d in trust_data:\n                trust_map[d.get('domain',\
          \ '')] = {\n                    'score': d.get('trust_score', 5),\n    \
          \                'category': d.get('category', 'unknown')\n            \
          \    }\n    except:\n        pass\n\n    # デフォルト信頼度\n    default_trust =\
          \ {\n        'official': 10, 'academic': 9, 'major_media': 8,\n        'tech_blog':\
          \ 6, 'sns': 3, 'unknown': 5\n    }\n\n    # 前回データ\n    prev_titles = []\n\
          \    prev_keywords = []\n    try:\n        prev_titles = json.loads(prev_titles_json)\n\
          \    except:\n        pass\n    try:\n        prev_keywords = json.loads(prev_keywords_json)\n\
          \    except:\n        pass\n\n    prev_title_set = set(t.lower().strip()[:30]\
          \ for t in prev_titles if t)\n    prev_kw_set = set(k.lower().strip() for\
          \ k in prev_keywords if k)\n\n    # 全findings解析\n    all_items = []\n  \
          \  for finding_text in raw_findings:\n        if not finding_text:\n   \
          \         continue\n        # Tavilyの結果はテキスト形式なのでそのまま1アイテムとして扱う\n      \
          \  lines = finding_text.strip().split('\\n')\n        title = lines[0][:200]\
          \ if lines else \"不明\"\n        url = \"\"\n        for line in lines:\n\
          \            if line.startswith('http'):\n                url = line.strip()\n\
          \                break\n            if 'url:' in line.lower():\n       \
          \         url = line.split(':', 1)[-1].strip()\n                break\n\n\
          \        # ドメイン抽出\n        domain = \"\"\n        if url:\n            try:\n\
          \                from urllib.parse import urlparse\n                parsed\
          \ = urlparse(url)\n                domain = parsed.netloc.replace('www.',\
          \ '')\n            except:\n                pass\n\n        # 信頼度スコア\n \
          \       trust_info = trust_map.get(domain, {})\n        trust_score = trust_info.get('score',\
          \ 5)\n\n        # 憶測検出\n        speculation_patterns = [\n            r'と見られ',\
          \ r'か$', r'の可能性', r'噂', r'リーク',\n            r'reportedly', r'rumor', r'allegedly',\
          \ r'might', r'could be'\n        ]\n        is_speculation = any(re.search(p,\
          \ finding_text, re.IGNORECASE) for p in speculation_patterns)\n\n      \
          \  # ハッシュ生成（タイトル正規化+ドメイン）\n        normalized_title = re.sub(r'[\\s\\-_:：【】\\\
          [\\]「」]', '', title.lower().strip())\n        article_hash = hashlib.sha256(f\"\
          {normalized_title[:50]}|{domain}\".encode()).hexdigest()[:16]\n\n      \
          \  # 差分判定\n        title_key = title.lower().strip()[:30]\n        if title_key\
          \ in prev_title_set:\n            diff_status = \"UPDATE\"\n        else:\n\
          \            diff_status = \"NEW\"\n\n        all_items.append({\n     \
          \       \"title\": title,\n            \"url\": url,\n            \"domain\"\
          : domain,\n            \"trust_score\": trust_score,\n            \"is_speculation\"\
          : is_speculation,\n            \"hash\": article_hash,\n            \"diff_status\"\
          : diff_status,\n            \"content\": finding_text[:500]\n        })\n\
          \n    # 信頼度フィルタ: スコア3未満を除外\n    filtered = [item for item in all_items if\
          \ item['trust_score'] >= 3]\n\n    # 重複統合: ハッシュベースのクラスタリング\n    clusters\
          \ = {}\n    for item in filtered:\n        h = item['hash']\n        if\
          \ h not in clusters:\n            clusters[h] = []\n        clusters[h].append(item)\n\
          \n    # 各クラスタから代表記事を選出\n    deduplicated = []\n    for h, items in clusters.items():\n\
          \        representative = max(items, key=lambda x: x['trust_score'])\n \
          \       representative['source_count'] = len(items)\n        if representative['is_speculation']\
          \ and representative['source_count'] == 1:\n            representative['label']\
          \ = '⚠️未確認'\n        else:\n            representative['label'] = ''\n \
          \       deduplicated.append(representative)\n\n    # NEW/UPDATEの集計\n   \
          \ new_count = sum(1 for d in deduplicated if d['diff_status'] == 'NEW')\n\
          \    update_count = sum(1 for d in deduplicated if d['diff_status'] == 'UPDATE')\n\
          \n    # 今回のキーワード抽出（次回用）\n    current_keywords = list(set(\n        d['title'][:20]\
          \ for d in deduplicated\n    ))\n\n    # 信頼度順にソート\n    deduplicated.sort(key=lambda\
          \ x: (-x['trust_score'], -x['source_count']))\n\n    return {\n        \"\
          filtered_findings\": json.dumps(deduplicated[:30], ensure_ascii=False),\n\
          \        \"diff_summary\": json.dumps({\n            \"new_count\": new_count,\n\
          \            \"update_count\": update_count,\n            \"total\": len(deduplicated),\n\
          \            \"removed_by_filter\": len(all_items) - len(filtered),\n  \
