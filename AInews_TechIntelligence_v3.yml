          \ str) -> dict:\n    diff = {}\n    try:\n        diff = json.loads(diff_summary)\n\
          \    except:\n        pass\n\n    new_count = diff.get('new_count', 0)\n\
          \    update_count = diff.get('update_count', 0)\n    total = diff.get('total',\
          \ 0)\n\n    header_text = f\"AI/IT テックインテリジェンス {date_range}\"\n    subheader\
          \ = f\"前回から: \U0001F195 NEW {new_count}件 / \U0001F504 UPDATE {update_count}件\
          \ / \U0001F4CA 合計{total}件\"\n\n    blocks = [\n        {\n            \"\
          type\": \"header\",\n            \"text\": {\"type\": \"plain_text\", \"\
          text\": header_text[:150], \"emoji\": True}\n        },\n        {\n   \
          \         \"type\": \"context\",\n            \"elements\": [{\"type\":\
          \ \"mrkdwn\", \"text\": subheader}]\n        },\n        {\"type\": \"divider\"\
          }\n    ]\n\n    # レポート本文をセクション分割\n    sections = report_text.split('━━━')\n\
          \    for section in sections:\n        section = section.strip()\n     \
          \   if not section:\n            continue\n        # 3000文字制限対応\n      \
          \  if len(section) > 2900:\n            chunks = [section[i:i+2900] for\
          \ i in range(0, len(section), 2900)]\n            for chunk in chunks:\n\
          \                blocks.append({\n                    \"type\": \"section\"\
          ,\n                    \"text\": {\"type\": \"mrkdwn\", \"text\": chunk}\n\
          \                })\n        else:\n            blocks.append({\n      \
          \          \"type\": \"section\",\n                \"text\": {\"type\":\
          \ \"mrkdwn\", \"text\": section}\n            })\n        blocks.append({\"\
          type\": \"divider\"})\n\n    # フッター\n    blocks.append({\n        \"type\"\
          : \"context\",\n        \"elements\": [{\"type\": \"mrkdwn\", \"text\":\
          \ \"\U0001F916 Powered by Dify + Claude | 自動生成レポート\"}]\n    })\n\n    #\
          \ 50ブロック上限対応\n    if len(blocks) > 49:\n        main_blocks = blocks[:48]\n\
          \        main_blocks.append(blocks[-1])  # フッター\n        overflow_blocks\
          \ = blocks[48:-1]\n        return {\n            \"main_blocks\": json.dumps(main_blocks,\
          \ ensure_ascii=False),\n            \"overflow_blocks\": json.dumps(overflow_blocks,\
          \ ensure_ascii=False),\n            \"has_overflow\": \"true\"\n       \
          \ }\n\n    return {\n        \"main_blocks\": json.dumps(blocks, ensure_ascii=False),\n\
          \        \"overflow_blocks\": \"[]\",\n        \"has_overflow\": \"false\"\
