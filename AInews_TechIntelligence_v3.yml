          role: user
          text: 'あなたはAI/ITニュースの調査デスクです。


            トピック「{{#1000000000001.topic#}}」について、以下の情報を元に検索クエリを生成してください。


            ## 対象期間

            {{#1000000000002.date_range#}}


            ## 固定カテゴリ（5枠）

            1. LLM/基盤モデル

            2. 開発ツール/フレームワーク

            3. ビジネス/企業動向

            4. 規制/安全性

            5. 研究/技術革新


            ## ウォッチリスト（継続追跡中の技術）

            {{#1000000000006.watch_keywords#}}


            ## 要件

            - 固定5カテゴリそれぞれに最適な検索クエリを1つずつ生成

            - ウォッチリストの技術名を含むクエリを1つ追加

            - 変動スポット枠用（急浮上テーマ探索）のクエリを1つ追加

            - 探索枠用（新興技術発掘）のクエリを1つ追加

            - 合計8クエリ


            ## クエリ作成ルール

            - 複合キーワードをORで組み合わせる

            - 期間指定: {{#1000000000002.query_suffix#}}

            - 英語と日本語を混ぜて網羅性を確保


            ## 出力形式（JSONリストのみ出力）

            ["クエリ1", "クエリ2", ..., "クエリ8"]'
