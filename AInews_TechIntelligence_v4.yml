    - data:
        code: "import json, hashlib, re\n\ndef main(main_findings: list, extra_findings: str) -> dict:\n    all_items = []\n    for finding in main_findings:\n        if not finding:\n            continue\n        lines = finding.strip().split('\\n')\n        title = lines[0][:200] if lines else \"Unknown\"\n        url = \"\"\n        for line in lines:\n            if line.strip().startswith('http'):\n                url = line.strip()\n                break\n        domain = \"\"\n        if url:\n            try:\n                from urllib.parse import urlparse\n                domain = urlparse(url).netloc.replace('www.', '')\n            except:\n                pass\n        norm = re.sub(r'[\\s\\-_:]', '', title.lower()[:50])\n        h = hashlib.sha256(f\"{norm}|{domain}\".encode()).hexdigest()[:16]\n        all_items.append({\"title\": title, \"url\": url, \"domain\": domain, \"hash\": h, \"source_type\": \"tavily\", \"content\": finding[:500]})\n\n    try:\n        for item in json.loads(extra_findings):\n            if isinstance(item, str):\n                st = \"github\" if \"[GitHub]\" in item else \"weak_signal\"\n                all_items.append({\"title\": item[:200], \"url\": \"\", \"domain\": \"\", \"hash\": hashlib.sha256(item[:100].encode()).hexdigest()[:16], \"source_type\": st, \"content\": item[:500]})\n    except:\n        pass\n    return {\"normalized_all\": json.dumps(all_items, ensure_ascii=False), \"total_raw_count\": str(len(all_items))}"
