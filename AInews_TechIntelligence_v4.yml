    - data:
        code: "import json\n\ndef main(prev_delivery: str, watchlist_data: str) -> dict:\n    prev_keywords = []\n    prev_titles = []\n    try:\n        prev_data = json.loads(prev_delivery)\n        if isinstance(prev_data, list) and len(prev_data) > 0:\n            rec = prev_data[0]\n            prev_keywords = rec.get('keywords', [])\n            cats = rec.get('categories', {})\n            for items in cats.values():\n                if isinstance(items, list):\n                    for item in items:\n                        if isinstance(item, dict) and 'title' in item:\n                            prev_titles.append(item['title'])\n    except:\n        pass\n\n    companies = []\n    oss_list = []\n    categories_list = []\n    try:\n        wl = json.loads(watchlist_data)\n        if isinstance(wl, list):\n            for item in wl:\n                t = item.get('entity_type', '')\n                entry = {\"name\": item.get(\"name\", \"\"), \"priority\": item.get(\"priority\", 5), \"search_names\": item.get(\"search_names\", [item.get(\"name\", \"\")]), \"official_domain\": item.get(\"official_domain\", \"\")}\n                if t == 'company':\n                    companies.append(entry)\n                elif t == 'oss':\n                    entry[\"github_repo\"] = item.get(\"github_repo\", \"\")\n                    oss_list.append(entry)\n                elif t == 'category':\n                    entry[\"search_terms\"] = item.get(\"search_terms\", [item.get(\"name\", \"\")])\n                    categories_list.append(entry)\n    except:\n        pass\n\n    if not companies:\n        companies = [\n            {\"name\": \"OpenAI\", \"search_names\": [\"OpenAI\"], \"official_domain\": \"openai.com\", \"priority\": 10},\n            {\"name\": \"Anthropic\", \"search_names\": [\"Anthropic\", \"Claude\"], \"official_domain\": \"anthropic.com\", \"priority\": 10},\n            {\"name\": \"Google DeepMind\", \"search_names\": [\"Google DeepMind\", \"Gemini\"], \"official_domain\": \"deepmind.google\", \"priority\": 9},\n            {\"name\": \"Meta AI\", \"search_names\": [\"Meta AI\", \"Llama\"], \"official_domain\": \"ai.meta.com\", \"priority\": 9},\n            {\"name\": \"Cursor\", \"search_names\": [\"Cursor AI\"], \"official_domain\": \"cursor.com\", \"priority\": 8},\n            {\"name\": \"Vercel\", \"search_names\": [\"Vercel\", \"v0.dev\"], \"official_domain\": \"vercel.com\", \"priority\": 7},\n            {\"name\": \"Mistral\", \"search_names\": [\"Mistral AI\"], \"official_domain\": \"mistral.ai\", \"priority\": 8},\n            {\"name\": \"Hugging Face\", \"search_names\": [\"Hugging Face\", \"HuggingFace\"], \"official_domain\": \"huggingface.co\", \"priority\": 8}\n        ]\n    if not oss_list:\n        oss_list = [\n            {\"name\": \"vllm\", \"github_repo\": \"vllm-project/vllm\", \"search_names\": [\"vLLM\"], \"priority\": 9},\n            {\"name\": \"ollama\", \"github_repo\": \"ollama/ollama\", \"search_names\": [\"Ollama\"], \"priority\": 9},\n            {\"name\": \"langchain\", \"github_repo\": \"langchain-ai/langchain\", \"search_names\": [\"LangChain\"], \"priority\": 8},\n            {\"name\": \"browser-use\", \"github_repo\": \"browser-use/browser-use\", \"search_names\": [\"browser-use\"], \"priority\": 7},\n            {\"name\": \"dify\", \"github_repo\": \"langgenius/dify\", \"search_names\": [\"Dify\"], \"priority\": 7}\n        ]\n    if not categories_list:\n        categories_list = [\n            {\"name\": \"AI IDE\", \"search_terms\": [\"AI IDE\", \"AI code editor\"], \"priority\": 9},\n            {\"name\": \"agent infrastructure\", \"search_terms\": [\"AI agent framework\", \"agent platform\"], \"priority\": 9},\n            {\"name\": \"MCP\", \"search_terms\": [\"Model Context Protocol\", \"MCP server\"], \"priority\": 8},\n            {\"name\": \"inference infrastructure\", \"search_terms\": [\"LLM inference\", \"inference engine\"], \"priority\": 7},\n            {\"name\": \"AI observability\", \"search_terms\": [\"LLM observability\", \"AI monitoring\"], \"priority\": 6}\n        ]\n\n    watch_summary = f\"Companies: {', '.join(c['name'] for c in companies[:8])} | OSS: {', '.join(o['name'] for o in oss_list[:5])} | Categories: {', '.join(c['name'] for c in categories_list[:5])}\"\n    return {\n        \"prev_keywords_json\": json.dumps(prev_keywords, ensure_ascii=False),\n        \"prev_titles_json\": json.dumps(prev_titles, ensure_ascii=False),\n        \"companies_json\": json.dumps(companies, ensure_ascii=False),\n        \"oss_json\": json.dumps(oss_list, ensure_ascii=False),\n        \"categories_json\": json.dumps(categories_list, ensure_ascii=False),\n        \"watch_summary\": watch_summary\n    }"
        code_language: python3
        outputs:
          categories_json:
            children: null
            type: string
          companies_json:
            children: null
            type: string
          oss_json:
            children: null
            type: string
          prev_keywords_json:
            children: null
            type: string
          prev_titles_json:
            children: null
            type: string
          watch_summary:
            children: null
            type: string
        selected: false
        title: "初期データ解析"
        type: code
        variables:
        - value_selector:
          - '4003'
          - body
          value_type: string
          variable: prev_delivery
        - value_selector:
          - '4004'
          - body
          value_type: string
          variable: watchlist_data
