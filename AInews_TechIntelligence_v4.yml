      width: 242
    - data:
        code: "import json, re\n\ndef main(eval_text: str, normalized_all: str, domain_trust_json: str, prev_titles_json: str) -> dict:\n    articles = json.loads(normalized_all) if normalized_all else []\n    evals = []\n    try:\n        raw = eval_text.strip()\n        s, e = raw.find('['), raw.rfind(']') + 1\n        if s >= 0 and e > s:\n            evals = json.loads(raw[s:e])\n    except:\n        pass\n\n    trust_map = {}\n    try:\n        for d in json.loads(domain_trust_json):\n            trust_map[d.get('domain', '')] = d.get('trust_score', 5)\n    except:\n        pass\n\n    prev_set = set()\n    try:\n        for t in json.loads(prev_titles_json):\n            prev_set.add(t.lower().strip()[:30])\n    except:\n        pass\n\n    eval_map = {ev.get('index', -1): ev.get('scores', {}) for ev in evals}\n    filtered = []\n    for i, art in enumerate(articles):\n        scores = eval_map.get(i, {})\n        overall = scores.get('overall', 5)\n        if overall < 3:\n            continue\n        art['eval_scores'] = scores\n        art['overall_score'] = overall\n        art['trust_score'] = trust_map.get(art.get('domain', ''), 5)\n        art['importance'] = 'HIGH' if overall >= 7 else ('NOTABLE' if overall >= 4 else 'LOW')\n        art['diff_status'] = 'UPDATE' if art.get('title', '').lower().strip()[:30] in prev_set else 'NEW'\n        speculation = [r'reportedly', r'rumor', r'allegedly', r'might be', r'could be']\n        art['is_speculation'] = any(re.search(p, art.get('content', ''), re.IGNORECASE) for p in speculation)\n        art['label'] = '\\u26a0\\ufe0f' if art['is_speculation'] else ''\n        filtered.append(art)\n    filtered.sort(key=lambda x: (-x.get('overall_score', 0),))\n    new_c = sum(1 for f in filtered if f['diff_status'] == 'NEW')\n    upd_c = sum(1 for f in filtered if f['diff_status'] == 'UPDATE')\n    kws = list(set(f['title'][:20] for f in filtered))\n    return {\n        \"filtered_findings\": json.dumps(filtered[:30], ensure_ascii=False),\n        \"diff_summary\": json.dumps({\"new_count\": new_c, \"update_count\": upd_c, \"total\": len(filtered)}, ensure_ascii=False),\n        \"current_keywords\": json.dumps(kws, ensure_ascii=False),\n        \"new_hashes\": json.dumps([f['hash'] for f in filtered], ensure_ascii=False)\n    }"
        code_language: python3
        outputs:
          current_keywords:
            children: null
