        - id: a1b2c3d4-2222-4000-8000-000000004013
          role: user
          text: "You are a tech intelligence analyst. Evaluate each article on 5 axes.\n\n## Articles\n{{#4012.normalized_all#}}\n\n## Score each article (1-5):\n1. primary_source: Official blog/release notes/docs=5, aggregator/rumor=1\n2. real_product: GA product with repo/API=5, vaporware=1\n3. dev_relevant: Directly actionable for developers=5, business-only=1\n4. try_now: Public GA/beta/playground=5, no access=1\n5. not_hype: Deep technical content=5, pure PR/marketing=1\n6. overall: Weighted score 1-10\n\n## Output JSON array ONLY:\n[{\"index\":0,\"title\":\"...\",\"scores\":{\"primary\":4,\"product\":5,\"dev_relevant\":5,\"try_now\":3,\"not_hype\":4,\"overall\":8}},...]"
        selected: false
        title: "5軸評価"
        type: llm
        vision:
          enabled: false
      height: 94
