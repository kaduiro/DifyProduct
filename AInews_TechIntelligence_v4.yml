    - data:
        code: "import json\n\ndef main(report_text: str, date_range: str, diff_summary: str) -> dict:\n    diff = json.loads(diff_summary) if diff_summary else {}\n    new_c = diff.get('new_count', 0)\n    upd_c = diff.get('update_count', 0)\n    total = diff.get('total', 0)\n    blocks = [\n        {\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": f\"AI/IT テックインテリジェンス {date_range}\"[:150], \"emoji\": True}},\n        {\"type\": \"context\", \"elements\": [{\"type\": \"mrkdwn\", \"text\": f\"前回から: \\U0001f195 NEW {new_c}件 / \\U0001f504 UPDATE {upd_c}件 / 合計{total}件\"}]},\n        {\"type\": \"divider\"}\n    ]\n    for section in report_text.split('\\u2501\\u2501\\u2501'):\n        s = section.strip()\n        if not s:\n            continue\n        if len(s) > 2900:\n            for i in range(0, len(s), 2900):\n                blocks.append({\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": s[i:i+2900]}})\n        else:\n            blocks.append({\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": s}})\n        blocks.append({\"type\": \"divider\"})\n    blocks.append({\"type\": \"context\", \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"\\U0001f916 Powered by Dify + Gemini | 一次情報優先・自動生成レポート\"}]})\n    if len(blocks) > 49:\n        blocks = blocks[:48] + [blocks[-1]]\n    return {\"main_blocks\": json.dumps(blocks, ensure_ascii=False)}"
