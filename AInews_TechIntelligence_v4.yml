        - id: a1b2c3d4-2222-4000-8000-000000004016
          role: user
          text: "あなたはAI/IT技術のインテリジェンスアナリストです。\n以下の検索結果を分析し、開発者向けテックインテリジェンスレポートを作成してください。\n\n## 対象期間\n{{#4002.date_range#}}\n\n## 検索結果（5軸評価・フィルタ済み）\n{{#4014.filtered_findings#}}\n\n## 差分サマリー\n{{#4014.diff_summary#}}\n\n## ウォッチ対象\n{{#4006.watch_summary#}}\n\n## 前回のキーワード\n{{#4006.prev_keywords_json#}}\n\n## 出力ルール\n\n### 1. 変化ハイライト（3行以内）\n前回からの重要変化を3行。[NEW]または[UPDATE]付与。\n\n### 2. 定点観測（固定5カテゴリ）\n各2-4件。3点固定フォーマット:\n[差分] タイトル（日付）\n  何が起きた: 事実1行（日付・固有名詞・数値必須）\n  誰に効く: BE/FE/ML/Infra/PM/CTOから1-3個\n  試すべきこと: 具体的アクション1行\nカテゴリ: 1.LLM/基盤モデル 2.開発ツール 3.ビジネス 4.規制/安全性 5.研究\n\n### 3. スポットライト（変動1枠）\n最も密度の高い新テーマを1つ。\n\n### 4. ウォッチリスト進捗\nウォッチ対象の進展報告。形式: [名前] ↗️/→/↘️\n\n### 5. 今週の発掘（1件）\nGitHub急伸や弱シグナルから1件。\n\n### フォーマット: Slack mrkdwn\n太字*テキスト*、区切り━━━、🆕[NEW] 🔄[UPDATE] 📍[WATCH]\n5000文字以内。期間外除外。憶測に⚠️。\n\n### 言語\n- レポート本文は必ず日本語で出力してください。\n- 英語ソースの情報も日本語に翻訳して記載してください。\n- 固有名詞（製品名、企業名、技術名）は英語のまま残してください。\n- 例: 「OpenAIがGPT-5 Turboを発表。出力コスト40%削減、128Kコンテキスト対応」"
