    - data:
        code: "import json\n\ndef main(companies_json: str, oss_json: str, categories_json: str, query_suffix: str) -> dict:\n    companies = json.loads(companies_json) if companies_json else []\n    oss_list = json.loads(oss_json) if oss_json else []\n    categories = json.loads(categories_json) if categories_json else []\n\n    launch_events = '(launch OR release OR announcing OR introducing OR \"now available\" OR beta OR GA)'\n    release_events = '(\"release notes\" OR changelog OR SDK OR API OR \"open source\" OR \"github release\")'\n    signal_events = '(docs OR \"API reference\" OR \"getting started\" OR pricing OR waitlist)'\n\n    queries = []\n\n    companies.sort(key=lambda x: x.get('priority', 0), reverse=True)\n    for c in companies[:8]:\n        names = c.get('search_names', [c['name']])\n        name_part = ' OR '.join(f'\"{n}\"' for n in names)\n        domain = c.get('official_domain', '')\n        if domain:\n            queries.append(f'site:{domain} {launch_events} {query_suffix}')\n        else:\n            queries.append(f'({name_part}) {launch_events} {query_suffix}')\n\n    oss_list.sort(key=lambda x: x.get('priority', 0), reverse=True)\n    for o in oss_list[:5]:\n        repo = o.get('github_repo', '')\n        if repo:\n            queries.append(f'\"{o[\"name\"]}\" (release OR update OR changelog) site:github.com {query_suffix}')\n        else:\n            queries.append(f'\"{o[\"name\"]}\" {release_events} {query_suffix}')\n\n    categories.sort(key=lambda x: x.get('priority', 0), reverse=True)\n    for cat in categories[:5]:\n        terms = cat.get('search_terms', [cat['name']])\n        term_part = ' OR '.join(f'\"{t}\"' for t in terms)\n        queries.append(f'({term_part}) {launch_events} {query_suffix}')\n\n    return {\"query_list_json\": json.dumps(queries, ensure_ascii=False)}"
        code_language: python3
