app:
  description: Minimal Test
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: workflow
  name: Minimal Test
kind: app
version: 0.1.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
      - data:
          sourceType: start
          targetType: end
        id: start-to-end
        source: start_node
        sourceHandle: source
        target: end_node
        targetHandle: target
        type: custom
        zIndex: 0
    nodes:
      - data:
          desc: ''
          selected: false
          title: Start
          type: start
          variables: []
        height: 54
        id: start_node
        position:
          x: 80
          y: 282
        positionAbsolute:
          x: 80
          y: 282
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244
      - data:
          desc: ''
          outputs: []
          selected: false
          title: End
          type: end
        height: 90
        id: end_node
        position:
          x: 600
          y: 282
        positionAbsolute:
          x: 600
          y: 282
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244
